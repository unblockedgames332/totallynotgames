<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: arial, sans-serif;
    background: #202124;
    color: #e8eaed;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 20px 20px 0 0;
    font-size: 13px;
  }
  .top-bar-left {
    position: absolute;
    left: 26px;
    top: 20px;
    display: flex;
  }
  .top-bar a {
    color: #e8eaed;
    text-decoration: none;
    margin-left: 24px;
  }
  .top-bar-left a {
    margin-left: 0;
    margin-right: 24px;
  }
  .top-bar a:hover {
    text-decoration: underline;
  }
  .apps-icon {
    width: 24px;
    height: 24px;
    padding: 8px;
    border-radius: 50%;
    cursor: pointer;
    vertical-align: middle;
    margin-left: 10px;
  }
  .apps-icon:hover {
    background: #3c4043;
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #8ab4f8;
    color: #202124;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    margin-left: 15px;
    cursor: pointer;
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-top: -40px;
    padding: 0 20px;
    position: relative;
  }
  .logo {
    margin-bottom: 25px;
  }
  .logo svg { display:block; width: 272px; height: 92px; }

  .share-icon {
    position: absolute;
    right: calc(50% - 292px);
    top: calc(50% - 40px);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #303134;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .share-icon svg { width: 18px; height: 18px; fill: #e8eaed; }
  .share-icon:hover { background: #3c4043; }

  .search-box-container {
    width: 100%;
    max-width: 584px;
  }
  .search-form {
    display: flex;
    align-items: center;
    height: 46px;
    background: #303134;
    border: 1px solid #303134;
    border-radius: 24px;
    padding: 0 14px;
    transition: box-shadow .2s ease, border-color .2s ease;
  }
  .search-form:hover, .search-form.focused {
    box-shadow: 0 1px 6px rgba(0,0,0,.4);
    border-color: #3c4043;
    background: #303134;
  }
  .search-icon {
    width: 20px;
    height: 20px;
    color: #9aa0a6;
    flex-shrink: 0;
  }
  .search-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    padding: 0 13px;
    background: transparent;
    color: #e8eaed;
  }
  .search-tools {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .divider {
    width: 1px;
    height: 24px;
    background: #5f6368;
  }
  .mic-icon, .camera-icon {
    width: 22px;
    height: 22px;
    cursor: pointer;
  }
  .ai-mode {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #e8eaed;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .ai-mode svg { width: 18px; height: 18px; }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 27px;
    flex-wrap: wrap;
  }
  .btn {
    background: #303134;
    border: 1px solid #303134;
    border-radius: 4px;
    color: #e8eaed;
    font-size: 14px;
    padding: 0 16px;
    height: 36px;
    cursor: pointer;
    font-family: arial, sans-serif;
  }
  .btn:hover {
    box-shadow: 0 1px 1px rgba(0,0,0,.3);
    background-color: #35363a;
    border: 1px solid #5f6368;
  }

  /* Footer */
  .footer {
    background: #171717;
    width: 100%;
    font-size: 14px;
    color: #9aa0a6;
  }
  .footer-location {
    padding: 15px 30px;
    border-bottom: 1px solid #3c4043;
  }
  .footer-links {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    flex-wrap: wrap;
  }
  .footer-links-left, .footer-links-right {
    display: flex;
    flex-wrap: wrap;
  }
  .footer a {
    color: #9aa0a6;
    text-decoration: none;
    margin-right: 26px;
  }
  .footer a:hover {
    text-decoration: underline;
  }
  .footer-links-right a {
    margin-right: 0;
    margin-left: 26px;
  }

  /* Floating window */
  .arctic-window {
    position: fixed;
    width: 700px;
    height: 500px;
    max-width: calc(100vw - 20px);
    max-height: calc(100vh - 20px);
    background: #202124;
    border: 1px solid #3c4043;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 1000;
    transition: left .38s cubic-bezier(0.22, 1, 0.36, 1),
                top .38s cubic-bezier(0.22, 1, 0.36, 1),
                width .38s cubic-bezier(0.22, 1, 0.36, 1),
                height .38s cubic-bezier(0.22, 1, 0.36, 1),
                border-radius .38s ease,
                box-shadow .38s ease;
  }
  .arctic-window.dragging {
    transition: none;
  }
  .arctic-titlebar {
    height: 38px;
    background: #303134;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px 0 14px;
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
    border-bottom: 1px solid #3c4043;
  }
  .arctic-titlebar:active {
    cursor: grabbing;
  }
  .arctic-title {
    font-size: 13px;
    color: #e8eaed;
    font-family: arial, sans-serif;
  }
  .arctic-controls {
    display: flex;
    gap: 4px;
  }
  .arctic-controls button {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: #e8eaed;
    font-size: 16px;
    line-height: 1;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arctic-controls button:hover {
    background: #454649;
  }
  #arcticClose:hover {
    background: #e81123;
    color: #fff;
  }
  .arctic-iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  .arctic-window.fullscreen {
    left: 0 !important;
    top: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    max-width: 100vw;
    max-height: 100vh;
    border-radius: 0;
    border: none;
  }
  .arctic-window.fullscreen .arctic-titlebar {
    cursor: default;
  }
  .arctic-window.fullscreen .arctic-controls {
    display: none;
  }

  #arcticExitFullscreen {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 6px;
    background: rgba(32, 33, 36, 0.55);
    backdrop-filter: blur(4px);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
  }
  #arcticExitFullscreen:hover {
    background: rgba(32, 33, 36, 0.8);
  }
  .arctic-window.fullscreen #arcticExitFullscreen {
    display: flex;
  }

  .arctic-notif {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #303134;
    color: #e8eaed;
    border: 1px solid #3c4043;
    padding: 12px 18px;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    z-index: 1100;
    display: none;
    opacity: 1;
    transition: opacity .5s ease;
  }

  @media (max-width: 600px) {
    .footer-links { flex-direction: column; }
    .footer-links-left, .footer-links-right { flex-direction: column; margin-bottom: 5px;}
    .footer a { margin: 6px 0; }
    .footer-links-right a { margin: 6px 0; }
    .logo svg { width: 200px; height: 68px; }
    .btn-row { gap: 8px; }
    .share-icon { display: none; }
    .ai-mode span { display: none; }
  }
</style>
</head>

  <script>
    (function () {
      var win = document.getElementById('arcticWindow');
      var titlebar = document.getElementById('arcticTitlebar');
      var closeBtn = document.getElementById('arcticClose');
      var minBtn = document.getElementById('arcticMinimize');
      var fullscreenBtn = document.getElementById('arcticFullscreen');
      var exitFullscreenBtn = document.getElementById('arcticExitFullscreen');
      var notif = document.getElementById('arcticNotif');
      var arcticFrame = document.getElementById('arcticFrame'); 

      var POS_KEY = 'arcticWindowPos';
      var NOTIF_KEY = 'arcticMinimizeNotifShown';

      var isMinimized = false;
      var isDragging = false;
      var isFullscreen = false;
      var dragOffsetX = 0, dragOffsetY = 0;
      var preFullscreenRect = null;

      function getSavedPos() {
        try {
          var raw = localStorage.getItem(POS_KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) {}
        return null;
      }

      function savePos(left, top) {
        try {
          localStorage.setItem(POS_KEY, JSON.stringify({ left: left, top: top }));
        } catch (e) {}
      }

      function defaultPos() {
        var w = win.offsetWidth || 700;
        var h = win.offsetHeight || 500;
        return {
          left: Math.max(10, (window.innerWidth - w) / 2),
          top: Math.max(10, (window.innerHeight - h) / 2)
        };
      }

      function clampToViewport(left, top) {
        var w = win.offsetWidth;
        var h = win.offsetHeight;
        left = Math.min(Math.max(0, left), Math.max(0, window.innerWidth - w));
        top = Math.min(Math.max(0, top), Math.max(0, window.innerHeight - h));
        return { left: left, top: top };
      }

      function openWindow() {
    arcticFrame.src = 'https://cdn.jsdelivr.net/gh/sealiee11/arctic@main/index.html?t=' + Date.now();

    win.style.display = 'flex';

    var pos = getSavedPos() || defaultPos();
    pos = clampToViewport(pos.left, pos.top);

    win.style.left = pos.left + 'px';
    win.style.top = pos.top + 'px';

    isMinimized = false;
}

      if (arcticTrigger) {
        arcticTrigger.addEventListener('click', function (e) {
          e.preventDefault();
          openWindow();
        });
      }

      closeBtn.addEventListener('click', function () {
        win.style.display = 'none';
        isMinimized = false;
        win.classList.remove('fullscreen');
        isFullscreen = false;
      });

      function maybeShowNotif() {
        var shown = false;
        try {
          shown = localStorage.getItem(NOTIF_KEY) === '1';
        } catch (e) {}
        if (shown) return;

        try {
          localStorage.setItem(NOTIF_KEY, '1');
        } catch (e) {}

        notif.style.display = 'block';
        notif.style.opacity = '1';
        setTimeout(function () {
          notif.style.opacity = '0';
          setTimeout(function () {
            notif.style.display = 'none';
          }, 500);
        }, 5000);
      }

      minBtn.addEventListener('click', function () {
        win.style.display = 'none';
        isMinimized = true;
        maybeShowNotif();
      });

      function enterFullscreen() {
        var rect = win.getBoundingClientRect();
        preFullscreenRect = { left: rect.left, top: rect.top };
        win.classList.add('fullscreen');
        isFullscreen = true;
      }

      function exitFullscreen() {
        win.classList.remove('fullscreen');
        isFullscreen = false;
        var pos = preFullscreenRect ? clampToViewport(preFullscreenRect.left, preFullscreenRect.top) : defaultPos();
        win.style.left = pos.left + 'px';
        win.style.top = pos.top + 'px';
      }

      fullscreenBtn.addEventListener('click', function () {
        if (isFullscreen) {
          exitFullscreen();
        } else {
          enterFullscreen();
        }
      });

      exitFullscreenBtn.addEventListener('click', function () {
        exitFullscreen();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Shift' && isMinimized) {
          win.style.display = 'flex';
          isMinimized = false;
        }
      });

      titlebar.addEventListener('mousedown', function (e) {
        if (isFullscreen) return;
        isDragging = true;
        win.classList.add('dragging');
        var rect = win.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', function (e) {
        if (!isDragging) return;
        var pos = clampToViewport(e.clientX - dragOffsetX, e.clientY - dragOffsetY);
        win.style.left = pos.left + 'px';
        win.style.top = pos.top + 'px';
      });

      document.addEventListener('mouseup', function () {
        if (isDragging) {
          isDragging = false;
          win.classList.remove('dragging');
          document.body.style.userSelect = '';
          var rect = win.getBoundingClientRect();
          savePos(rect.left, rect.top);
        }
      });
    })();
